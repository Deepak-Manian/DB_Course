<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Box</title>
    <style>
        body {

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: sans-serif;
        }

        .container {

            width: 500px;
            height: 400px;
            border: 5px solid #333;
            background-color: white;
            position: relative;

        }

        .character {
            width: 60px;

            height: auto;
            position: absolute;


            animation: bounceX 3s linear infinite alternate,
                bounceY 4s linear infinite alternate;
        }


        @keyframes bounceX {
            from {
                left: 0;
            }

            to {
                left: 440px;
            }


        }


        @keyframes bounceY {
            from {
                top: 0;
            }

            to {
                top: 340px;
            }

        }
    </style>
</head>

<body>

    <div class="container">
        <img src="character.png" alt="Character" class="character">
    </div>

</body>

</html>
